services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  influxdb:
    image: influxdb:1.8
    container_name: iot-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: iot
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER:-admin}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-admin-secret}
      INFLUXDB_USER: ${INFLUXDB_USER:-nodered}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD:-nodered-secret}
    volumes:
      - influxdb_data:/var/lib/influxdb
    restart: unless-stopped

  node-red:
    image: nodered/node-red:latest
    container_name: iot-node-red
    ports:
      - "1880:1880"
    volumes:
      - node_red_data:/data
      - ../node-red/flows.json:/data/flows.json
      - ../node-red/flows_cred.json:/data/flows_cred.json
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  node_red_data:
  influxdb_data:
