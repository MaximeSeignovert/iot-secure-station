[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Port serie local (optionnel) : decommenter et adapter
; upload_port = COM8
; monitor_port = COM8

board_build.filesystem = littlefs

; Le dashboard est embarque dans le firmware (scripts/embed_web.py).
; Un seul upload suffit : pio run -t upload
extra_scripts = pre:scripts/embed_web.py

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    256dpi/MQTT @ ^2.5.2
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

build_flags =
    -DCORE_DEBUG_LEVEL=1
